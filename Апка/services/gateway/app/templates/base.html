<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Gateway" }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6f6;
        --surface: #ffffff;
        --text: #111111;
        --muted: #3d3d3d;
        --border: #111111;
        --primary: #ffe800;
        --danger: #ff003d;
        --success: #00c853;
        --warning: #ff6d00;
        --shadow: 8px 8px 0 #111111;
        --radius: 0px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background: var(--bg);
        color: var(--text);
      }
      a { color: var(--text); text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 3px; }
      a:hover { background: var(--primary); }
      .container { max-width: 1100px; margin: 0 auto; padding: 18px 14px 56px; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 14px;
        border: 3px solid var(--border);
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        position: sticky;
        top: 12px;
        z-index: 10;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: 0.6px; text-transform: uppercase; }
      .brand-badge {
        width: 28px;
        height: 28px;
        border-radius: 0;
        background: var(--primary);
        border: 3px solid var(--border);
      }
      .nav { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .nav a, .nav button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 0;
        border: 3px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-weight: 800;
      }
      .nav a:hover, .nav button:hover { background: var(--primary); text-decoration: none; }
      .page-title { margin: 22px 2px 14px; font-size: 1.6rem; letter-spacing: -0.02em; text-transform: uppercase; }
      h2 { margin: 0 0 10px; font-size: 1.05rem; letter-spacing: 0.04em; text-transform: uppercase; }
      p { line-height: 1.45; }
      .card {
        border: 3px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .muted { color: var(--muted); }
      .danger { color: var(--danger); }
      .alert {
        padding: 12px 14px;
        border: 3px solid var(--border);
        background: #ffffff;
        border-radius: 0;
        margin: 12px 0 0;
      }
      label { display: block; font-size: 0.9rem; margin: 12px 0 6px; color: var(--muted); }
      input, textarea, select {
        width: 100%;
        padding: 11px 12px;
        border: 3px solid var(--border);
        background: #ffffff;
        color: var(--text);
        border-radius: 0;
        outline: none;
      }
      input:focus, textarea:focus, select:focus { border-color: var(--border); box-shadow: 0 0 0 5px var(--primary); }
      button {
        padding: 10px 14px;
        border: 3px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: 0;
        cursor: pointer;
        font-weight: 900;
        text-transform: uppercase;
      }
      button.primary { background: var(--primary); border-color: var(--border); }
      button.danger { background: var(--danger); color: #ffffff; }
      button.success { background: var(--success); color: #ffffff; }
      button:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0 #111111; }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      .spacer { flex: 1; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 2px solid rgba(17, 17, 17, 0.25); padding: 12px 10px; text-align: left; vertical-align: middle; }
      th { color: var(--muted); font-weight: 900; font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase; }
      code { background: #ffffff; padding: 3px 7px; border-radius: 0; border: 2px solid var(--border); }
      pre { border: 3px solid var(--border); padding: 10px 12px; margin: 0; box-shadow: var(--shadow); background: var(--surface); overflow: auto; }
      .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 0; border: 2px solid var(--border); background: #ffffff; font-size: 0.85rem; font-weight: 900; text-transform: uppercase; }
      .badge.success { background: var(--success); color: #ffffff; }
      .badge.danger { background: var(--danger); color: #ffffff; }
      .badge.primary { background: var(--primary); }
      .auth-shell { max-width: 460px; margin: 44px auto 0; }
      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="brand-badge"></div>
          <a href="/">VolkovApp</a>
        </div>
        <div class="nav">
          <a href="/">Главная</a>
          <a href="/projects">Проекты</a>
          <a href="/admin">Админка</a>
        </div>
        <div class="nav">
          {% if current_user %}
            <span class="muted">{{ current_user.email }} ({{ current_user.role }})</span>
            <form method="post" action="/logout" style="margin:0">
              <button type="submit">Выйти</button>
            </form>
          {% else %}
            <a href="/login">Вход</a>
            <a href="/register">Регистрация</a>
          {% endif %}
        </div>
      </div>

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
