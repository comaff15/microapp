<table id="projects-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Название</th>
      <th>Владелец</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for p in projects %}
      <tr>
        <td><code>{{ p.id }}</code></td>
        <td>{{ p.name }}</td>
        <td><code>{{ p.owner_email }}</code></td>
        <td><a href="/projects/{{ p.id }}">Открыть</a></td>
      </tr>
    {% endfor %}
  </tbody>
</table>
