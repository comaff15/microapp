[pytest]
addopts = -ra --timeout=180
testpaths = tests
norecursedirs = services
asyncio_mode = auto
markers =
    unit: pure unit tests (no network, no DB)
    api: api-level tests over HTTP
    integration: multi-service integration tests
    data: direct database/data-layer tests
    e2e: end-to-end UI tests (Playwright)
    contract: contract/schema tests (OpenAPI/events)
    security: security-focused tests
    perf: performance/load tests (not run by default)
